services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mqtt_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: ./app
    environment:
      MQTT_BROKER: "vps.ip.or.hostname"
    volumes:
      - ./my_exports:/exports # Må lage /my_exports folder som lokalt volum 
    depends_on:
      - db
